_format_version: "3.0"

services:
  # ── Auth Service ──────────────────────────────────────────────────────────
  - name: auth-service
    url: http://auth:8080
    routes:
      - name: auth-route
        paths: ["/auth"]
        strip_path: true
    plugins:
      - name: cors
        config:
          origins: ["http://localhost:5173"]
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Content-Type, Authorization, X-User-Name, X-User-Role, Cookie]
          exposed_headers: [Authorization]
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379

  # ── Upload Service ────────────────────────────────────────────────────────
  - name: upload-service
    url: http://upload:6565
    routes:
      - name: upload-route
        paths: ["/upload"]
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["http://localhost:5173"]
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Content-Type, Authorization, X-User-Name, X-User-Role, Cookie]
          exposed_headers: [Authorization]
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: pre-function
        config:
          access:
            - |
              local http = require("resty.http")
              local httpc = http.new()

              -- Forward the incoming Cookie header to the auth service
              local cookie = kong.request.get_header("Cookie")
              local headers = { ["Cookie"] = cookie }

              local res, err = httpc:request_uri("http://auth:8080/auth/validate", {
                method = "GET",
                headers = headers,
              })

              if err then
                return kong.response.exit(503, { message = "Auth service unreachable" })
              end

              if res.status ~= 200 then
                return kong.response.exit(401, { message = "Unauthorized" })
              end

              -- Forward identity headers to upstream
              local user_name = res.headers["X-User-Name"]
              local user_role = res.headers["X-User-Role"]
              if user_name then
                kong.service.request.set_header("X-User-Name", user_name)
              end
              if user_role then
                kong.service.request.set_header("X-User-Role", user_role)
              end

